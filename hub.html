<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>톰토미 마케팅 허브</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FAF8F5;
    --tab-active-bg: #FF6B35;
    --tab-active-text: #fff;
    --tab-inactive-bg: #EEEBE6;
    --tab-inactive-text: #7A7368;
    --tab-hover-bg: #E2DED7;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --header-height: 56px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .hub-header {
    height: var(--header-height);
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: #fff;
    box-shadow: var(--shadow);
    gap: 24px;
    flex-shrink: 0;
    z-index: 10;
  }

  .hub-logo {
    font-size: 15px;
    font-weight: 700;
    color: #FF6B35;
    letter-spacing: -0.3px;
    white-space: nowrap;
  }

  .hub-logo span {
    color: #B0A99F;
    font-weight: 400;
    margin-left: 6px;
    font-size: 12px;
  }

  /* ── Tabs ── */
  .tab-group {
    display: flex;
    gap: 4px;
  }

  .tab-btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--tab-inactive-bg);
    color: var(--tab-inactive-text);
    letter-spacing: -0.2px;
  }

  .tab-btn:hover {
    background: var(--tab-hover-bg);
    color: #4A453E;
  }

  .tab-btn.active {
    background: var(--tab-active-bg);
    color: var(--tab-active-text);
    box-shadow: 0 2px 6px rgba(255,107,53,0.25);
  }

  /* ── 새 탭으로 열기 버튼 ── */
  .open-external {
    margin-left: auto;
    padding: 6px 12px;
    border: 1.5px solid #DDD8D1;
    border-radius: 6px;
    background: transparent;
    color: #9A9389;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .open-external:hover {
    border-color: #FF6B35;
    color: #FF6B35;
  }

  .open-external svg {
    width: 12px;
    height: 12px;
  }

  /* ── iframe 영역 ── */
  .frame-container {
    flex: 1;
    position: relative;
  }

  .frame-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }

  .frame-container iframe.hidden {
    visibility: hidden;
    pointer-events: none;
  }

  /* ── 로딩 ── */
  .loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 5;
    transition: opacity 0.3s ease;
  }

  .loading-overlay.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .loading-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #FF6B35;
    margin: 0 4px;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.15s; }
  .loading-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── 모바일 ── */
  @media (max-width: 600px) {
    .hub-header { padding: 0 12px; gap: 12px; }
    .hub-logo span { display: none; }
    .tab-btn { padding: 7px 12px; font-size: 12px; }
    .open-external { padding: 5px 8px; font-size: 11px; }
  }
</style>
</head>
<body>

<header class="hub-header">
  <div class="hub-logo">톰토미<span>마케팅 허브</span></div>
  <div class="tab-group">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 커머스 대시보드</button>
    <button class="tab-btn" data-tab="online" onclick="switchTab('online')">📈 온라인마케팅 성과</button>
  </div>
  <button class="open-external" onclick="openExternal()" title="현재 탭을 새 창에서 열기">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-3"/>
      <path d="M9 2h5v5"/>
      <path d="M14 2L7 9"/>
    </svg>
    새 탭
  </button>
</header>

<div class="frame-container" id="frameContainer">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
  <iframe id="frame-dashboard" src="https://marketeryea-hub.github.io/tomtomi-market/" onload="onFrameLoad('dashboard')"></iframe>
  <iframe id="frame-online" class="hidden" src="https://marketeryea-hub.github.io/tomtomi-online/" onload="onFrameLoad('online')"></iframe>
</div>

<script>
  let currentTab = 'dashboard';
  const loaded = { dashboard: false, online: false };

  const URLS = {
    dashboard: 'https://marketeryea-hub.github.io/tomtomi-market/',
    online: 'https://marketeryea-hub.github.io/tomtomi-online/'
  };

  function switchTab(tab) {
    if (tab === currentTab) return;
    currentTab = tab;

    // 탭 버튼 활성화
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });

    // iframe 전환
    document.querySelectorAll('.frame-container iframe').forEach(f => {
      f.classList.add('hidden');
    });
    document.getElementById('frame-' + tab).classList.remove('hidden');
  }

  function onFrameLoad(tab) {
    if (!loaded[tab]) {
      loaded[tab] = true;
      // 두 개 다 로드되면 로딩 오버레이 제거
      if (loaded.dashboard || tab === currentTab) {
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.add('fade-out');
        setTimeout(() => overlay.remove(), 400);
      }
    }
  }

  function openExternal() {
    window.open(URLS[currentTab], '_blank');
  }

  // 키보드 단축키: Ctrl+1, Ctrl+2로 탭 전환
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === '1') { e.preventDefault(); switchTab('dashboard'); }
    if ((e.ctrlKey || e.metaKey) && e.key === '2') { e.preventDefault(); switchTab('online'); }
  });
</script>

</body>
</html>
